#=====================================================#
# Change the visual aspect of the windows of hyprland #
#=====================================================#

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2

    col.active_border = rgb(c200fb)
    col.inactive_border = rgb(00120b)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    allow_tearing = true

    layout = dwindle
}

decoration {
    rounding = 7
    rounding_power = 5

    # Change transparency of focused and unfocused windows
    active_opacity = 0.9
    inactive_opacity = 1.0
    shadow {
        enabled = false
        range = 10
        render_power = 4
        color = rgba(1a1a1aee)
    }
   
    blur {
        enabled = true
        size = 6
        passes = 1

        vibrancy = 0.1696
    }
}
